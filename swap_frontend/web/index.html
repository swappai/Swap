<!DOCTYPE html>
<html>

<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="$WAP — Skill-for-skill exchange platform">

  <script type="module" src="https://unpkg.com/@google/model-viewer@^3.3.0/dist/model-viewer.min.js"></script>
  <script nomodule src="https://unpkg.com/@google/model-viewer@^3.3.0/dist/model-viewer-legacy.js"></script>

  <!-- cropperjs (required by image_cropper_for_web) -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.2/cropper.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.2/cropper.min.js"></script>

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="$WAP">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png" />

  <title>$WAP</title>
  <link rel="manifest" href="manifest.json">

  <!-- Application Insights snippet (connection string injected at build / runtime) -->
  <script type="text/javascript">
    var sdkInstance = "appInsightsSDK";
    window[sdkInstance] = "appInsights";
    var aiConfig = window["appInsights"] || (function (cfg) {
      // Minimal AI loader — replace connectionString at deploy time
      // or load dynamically from /config.json served by the backend.
      function l(e) { var t = cfg[e] || {}; return t; }
      return { config: l("config") };
    })({ config: { connectionString: "" } });
    // Full SDK loaded lazily when connectionString is available.
  </script>
</head>

<body>
  <script src="flutter_bootstrap.js" async></script>
</body>

</html>
